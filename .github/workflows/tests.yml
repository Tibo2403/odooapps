name: Tests

on:
  push:
  pull_request:

jobs:
  odoo-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:14
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: odoo
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v3
      - name: Run module tests
        run: |
          docker run --rm --network host \
            -v "${{ github.workspace }}:/mnt/extra-addons" \
            odoo:latest odoo \
            -d odoo \
            -i accounting_pdf_reports,om_account_accountant,om_account_asset,om_account_budget,om_account_daily_reports,om_account_followup,om_data_remove,om_fiscal_year,om_hr_payroll,om_hr_payroll_account,om_recurring_payments \
            --test-enable --stop-after-init
